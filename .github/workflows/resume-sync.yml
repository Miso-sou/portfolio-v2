name: Sync Resume from Google Drive

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Download Resume from Google Drive
        run: |
          # Replace 'YOUR_FILE_ID_HERE' with the actual File ID of your resume PDF
          FILE_ID="YOUR_FILE_ID_HERE"
          
          # Download the file from Google Drive directly into the public folder
          wget -O public/resume.pdf "https://drive.google.com/uc?export=download&id=${FILE_ID}"

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          git add public/resume.pdf
          
          # Only commit and push if the PDF actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update resume from google drive" && git pull --rebase origin main && git push)
